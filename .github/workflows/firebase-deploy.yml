
# GitHub Action for deploying to Firebase Hosting
name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main # หรือ branch หลักที่ครูใช้

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: viewer/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: ./viewer

      - name: Verify MeeBot Project
        run: node copilot/verifyMeeBotFlow.js

      - name: Build Project
        run: npm run build
        working-directory: ./viewer

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseToken: '${{ secrets.FIREBASE_TOKEN }}'
          projectId: 'meechainmeebot-22679683-20db7'
