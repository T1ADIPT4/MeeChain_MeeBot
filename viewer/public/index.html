<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeeChain Interactive Viewer - Registry, Milestone & Badge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
    }

    /* Loading fallback styles */
    .loading-fallback {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 24px;
    }

    .loading-fallback.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-fallback">
      <div>
        <div style="font-size: 64px; text-align: center;">🤖</div>
        <div style="margin-top: 20px;">Loading MeeChain Viewer...</div>
      </div>
    </div>
  </div>
  
  <noscript>
    You need to enable JavaScript to run this app.
  </noscript>
</body>
</html>
